<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Image Hover</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <h1>Image Hover Demo</h1>
    <div id="image">Hover over an image below to display here.</div>
    <div class="thumbnails">
        <img src="105422453_p0_master1200.jpg" alt="First picture" onmouseover="upDate(this)" onmouseout="undo()">
        <img src="141914023_p0_master1200.jpg" alt="Second picture" onmouseover="upDate(this)" onmouseout="undo()">
        <img src="111222928_p0_master1200.jpg" alt="Third picture" onmouseover="upDate(this)" onmouseout="undo()">
    </div>
</body>
</html>
